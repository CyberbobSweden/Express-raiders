<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0e2e" />
  <meta name="description" content="Express Raiders – ett western-actionspel där du slåss mot banditer på ett rullande tåg." />
  <title>Express Raiders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game-shell">
    <canvas id="game" width="640" height="360"></canvas>

    <!-- HUD overlay -->
    <div id="hud" class="hidden">
      <div class="hud-row">
        <div class="hud-block">
          <span class="hud-label">POÄNG</span>
          <span id="score" class="hud-value">000000</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">VAGN</span>
          <span id="stage" class="hud-value">1</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">LIV</span>
          <span id="lives" class="hud-value">♥♥♥</span>
        </div>
      </div>
      <div class="health-wrap">
        <span class="hud-label small">HÄLSA</span>
        <div class="health-bar"><div id="health-fill"></div></div>
      </div>
    </div>

    <!-- Touch controls -->
    <div id="touch" class="hidden">
      <div class="pad-left">
        <button class="tbtn" data-key="left" aria-label="Vänster">◀</button>
        <button class="tbtn" data-key="right" aria-label="Höger">▶</button>
      </div>
      <div class="pad-right">
        <button class="tbtn act" data-key="punch" aria-label="Slag">SLAG</button>
        <button class="tbtn act" data-key="kick" aria-label="Spark">SPARK</button>
        <button class="tbtn jump" data-key="jump" aria-label="Hoppa">HOPP</button>
      </div>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
